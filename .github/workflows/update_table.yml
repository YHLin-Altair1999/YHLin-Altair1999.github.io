name: Update Discussion Table from Excel

on:
  push:
    paths:
      - 'events/DKGroup/PaperDiscussionRecord.xlsx'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl

    - name: Process Excel file and Inject Table
      working-directory: events/DKGroup
      run: |
        python excel2html.py

    - name: Commit and Push Changes
      working-directory: events/DKGroup
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update timeline tabs from Excel" && git push)